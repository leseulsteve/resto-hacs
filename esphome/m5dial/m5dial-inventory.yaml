            id: lbl_known_location_select
            align: CENTER
            y: -12
            text: ""
            text_color: 0xFFFFFF
        - label:
            align: CENTER
            y: 32
            text: "Press to save"
            text_color: 0x34C759
        - label:
            align: BOTTOM_MID
            y: -24
            text: "Turn location"
            text_color: 0x3A3A3C

    - id: page_done
      bg_color: 0x0B0B0F
      widgets:
        - label:
            align: CENTER
            y: -10
            text: "Saved"
            text_color: 0x34C759
        - label:
            align: CENTER
            y: 28
            text: "Press to scan"
            text_color: 0x8E8E93

    - id: page_error
      bg_color: 0x0B0B0F
      widgets:
        - label:
            align: CENTER
            y: -30
            text: "HA timeout"
            text_color: 0xFF3B30
        - label:
            align: CENTER
            y: 6
            text: "Check RESTOCK logs"
            text_color: 0xFFFFFF
        - label:
            align: CENTER
            y: 42
            text: "Press to scan"
            text_color: 0x8E8E93
