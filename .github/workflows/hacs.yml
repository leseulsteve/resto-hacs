name: HACS

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate with HACS
        uses: hacs/action@main
        with:
          category: integration
