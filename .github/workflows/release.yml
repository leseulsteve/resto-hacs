name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag matches manifest version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version="$(python3 -c 'import json; print(json.load(open("custom_components/restock/manifest.json"))["version"])')"
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Tag v$tag_version does not match manifest version $manifest_version"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
